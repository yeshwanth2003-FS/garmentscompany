<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailerhub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assest/styles/project.css">

</head>
<body>
    <header id="navbar">

    <div class="container">

        <a href="#" class="logo">
            <img src="../assest/photos/logo22.png" alt="">
        </a>

        <ul class="nav-menu">

            <li><a href="#home" class="active">Home</a></li>
            <li><a href="#job">Jobs</a></li>
            <li><a href="#tailers">Tailors</a></li>
            <li><a href="#companies">Companies</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>

        </ul>

        <div class="buttons">

            <button class="login">
                Login
            </button>

            <button class="register">
                Register
            </button>

        </div>

    </div>


</header>
<section class="hero">

        <div class="circles">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="hero-overlay"></div>

    <div class="hero-content">

        <p class="tagline">🚀 India's #1 Garment Hiring Platform</p>

        <h1>
            Connecting Skilled <br>
            <span id="typing"></span>
        </h1>

        <p class="hero-description">
            Find jobs, hire experienced tailors, and build stronger garment teams —
            all in one place.
        </p>

        <div class="hero-buttons">

            <button class="btn-primary">
                🔍 Find Jobs
            </button>

            <button class="btn-secondary">
                🏭 Hire Tailors
            </button>

        </div>

        <div class="hero-stats">

            <div>
                <h2>🏭 500+</h2>
                <span>Companies</span>
            </div>

            <div>
                <h2>🧵 25K+</h2>
                <span>Tailors</span>
            </div>

            <div>
                <h2>⭐ 95%</h2>
                <span>Placement Rate</span>
            </div>

        </div>

    </div>

    <div class="scroll-indicator">
        <span></span>
    </div>
    <div class="custom-shape-divider-bottom-hero">
    <svg data-name="Layer 1"
         xmlns="http://www.w3.org/2000/svg"
         viewBox="0 0 1200 120"
         preserveAspectRatio="none">

        <path
            d="M321.39,56.44C184.74,41.87,
            78.43,96.84,0,96V0H1200V27.35
            c-54.79,25.6-112.86,48.58-180.91,
            42.42-86.39-7.84-172.75-48.16-259.24-48.11
            C634.54,21.72,548.74,74,321.39,56.44Z"
            class="shape-fill">
        </path>

    </svg>
</div>

</section>
    <script src="../assest/js/animation.js"></script>
