<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <style>
        .login-parent{
    width: 450px;
    margin: 100px auto;
    background-color: #1E293B;
    padding: 40px;
    border-radius: 30px;
    color: white;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
}

.login-header{
    text-align: center;
    margin-bottom: 30px;
}

.login-header h3{
    color: #f4b400;
    font-size: 30px;
    margin-bottom: 10px;
}

.login-form{
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.login-form input{
    padding: 15px;
    border: none;
    border-radius: 12px;
    outline: none;
    font-size: 15px;
}

.login-form input:focus{
    border: 2px solid #f4b400;
}

.remember{
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
}

.remember a{
    color: #f4b400;
    text-decoration: none;
}

.login-form button{
    background-color: #f4b400;
    color: #1E1B4B;
    border: none;
    padding: 15px;
    border-radius: 30px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
}

.login-form button:hover{
    transform: translateY(-5px);
    background-color: #ffd54f;
}

.signup{
    text-align: center;
}

.signup a{
    color: #f4b400;
    text-decoration: none;
    font-weight: 600;
}
    </style>
</head>
<body>
    <div class="login-parent">

    <div class="login-header">
        <h3>Welcome Back</h3>
        <p>Login to your TailorHub account</p>
    </div>

    <div class="login-form">

        <input type="email" placeholder="Email Address">

        <input type="password" placeholder="Password">

        <div class="remember">
            <label>
                <input type="checkbox">
                Remember Me
            </label>

            <a href="#">Forgot Password?</a>
        </div>

        <button>Login</button>

        <p class="signup">
            Don't have an account?
            <a href="registerform.html">Register Now</a>
        </p>

    </div>

</div>
</body>
</html>
